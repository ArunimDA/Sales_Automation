name: Sales Automation Run

on:
  schedule:
    # Runs every 2 minutes
    - cron: '*/2 * * * *' 
  workflow_dispatch:      
    # Allows you to click 'Run workflow' manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # Pulls your code from the repository
        uses: actions/checkout@v3

      - name: Set up Python
        # Installs Python on the GitHub virtual machine
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        # Installs the libraries listed in your requirements.txt
        run: |
          python -m pip install --upgrade pip
          pip install pandas sqlalchemy psycopg2-binary openpyxl

      - name: Run automation script
        # This is where the magic happens: Confidential mapping
        env:
          # These map your 'Settings > Secrets' to Python 'os.getenv'
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python sales_automation.py
